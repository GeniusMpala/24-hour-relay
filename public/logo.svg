<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" role="img" aria-labelledby="title desc">
  <title id="title">Wisdom and Grace International Ministries</title>
  <desc id="desc">Church logo with gold wave and cross above blue Wisdom and Grace text.</desc>
  <defs>
    <style>
      .gold { fill: #b58700; }
      .blue { fill: #0d4479; }
      .stroke-gold { fill: none; stroke: #b58700; stroke-linecap: round; stroke-linejoin: round; stroke-width: 6; }
      .wordmark { font-family: Arial, Helvetica, sans-serif; font-weight: 700; letter-spacing: 1px; }
      .small { font-family: Arial, Helvetica, sans-serif; font-weight: 400; }
      .spaced { letter-spacing: 18px; }
    </style>
  </defs>

  <path class="stroke-gold" d="M86 58c26-12 54-12 84 2 34 16 70 18 108 6 18-6 35-15 52-15 24 0 44 8 67 17" />
  <path class="stroke-gold" d="M82 76c25-10 55-10 88 3 35 13 71 15 108 4 18-6 34-13 52-13 21 0 40 6 61 14" />
  <rect class="gold" x="247" y="28" width="8" height="34" rx="2" />
  <rect class="gold" x="236" y="38" width="30" height="8" rx="2" />

  <text x="260" y="140" text-anchor="middle" class="blue wordmark" font-size="74">WISDOM</text>
  <text x="260" y="165" text-anchor="middle" class="small" font-size="26">and</text>
  <text x="260" y="196" text-anchor="middle" class="blue wordmark spaced" font-size="34">G R A C E</text>
  <text x="260" y="217" text-anchor="middle" class="blue small" font-size="18">INTERNATIONAL MINISTRIES</text>
</svg>
